<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <title>Adventure — Photography</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #1a1a1a;
      --text: #050505;
      --text-muted: #888;
      --gap: 12px;
      --header-h: 60px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 100;
      transition: background 0.4s ease, backdrop-filter 0.4s ease;
    }
    header.scrolled {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .site-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    nav {
      display: flex;
      gap: 36px;
      align-items: center;
    }
    nav a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    nav a:hover, nav a.active { color: var(--text); }

    /* ── Page Title ───────────────────────────────────────── */
    .page-title {
      padding: calc(var(--header-h) + 48px) 40px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .page-title h1 {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }
    .page-title span {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Gallery ──────────────────────────────────────────── */
    #gallery {
      padding: 0 var(--gap) var(--gap);
    }
    .gallery-row {
      display: flex;
      gap: var(--gap);
      margin-bottom: var(--gap);
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      flex-shrink: 0;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .gallery-item img.loaded { opacity: 1; }
    .gallery-item:hover img { transform: scale(1.04); }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.65) 0%,
        rgba(0, 0, 0, 0.08) 45%,
        transparent 65%
      );
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }

    .gallery-item-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 14px 16px;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    .gallery-item:hover .gallery-item-caption {
      opacity: 1;
      transform: translateY(0);
    }
    .gallery-item-caption p {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.88);
    }

    /* ── Lightbox ─────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 56px 80px 40px;
    }
    #lightbox.open { display: flex; }

    #lb-img {
      max-width: calc(100vw - 160px);
      max-height: calc(100vh - 220px);
      object-fit: contain;
      display: block;
      flex-shrink: 0;
      transition: opacity 0.18s ease;
    }
    #lb-img.fading { opacity: 0; }

    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      padding: 20px 16px;
      transition: color 0.2s ease;
      line-height: 0;
    }
    .lb-btn:hover { color: rgba(255, 255, 255, 0.9); }
    #lb-prev { left: 8px; }
    #lb-next { right: 8px; }
    .lb-btn svg { width: 30px; height: 30px; display: block; }

    #lb-close {
      position: fixed;
      top: 18px;
      right: 22px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      padding: 8px;
      transition: color 0.2s ease;
      line-height: 0;
    }
    #lb-close:hover { color: rgba(255, 255, 255, 0.9); }
    #lb-close svg { width: 20px; height: 20px; display: block; }

    #lb-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .lb-meta {
      text-align: center;
      white-space: nowrap;
    }
    #lb-title {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 5px;
    }
    #lb-counter {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.28);
    }

    #lb-inquire {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 22px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.75);
      font-family: inherit;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
    }
    #lb-inquire:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.55);
      color: #fff;
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      padding: 52px 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p, footer a {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
    }
    footer a:hover { color: var(--text); transition: color 0.2s; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --gap: 6px; }
      header { padding: 0 20px; }
      nav { gap: 24px; }
      .page-title { padding-left: 20px; padding-right: 20px; }
      footer { padding: 40px 20px; flex-direction: column; gap: 12px; }
      #lb-img { max-width: calc(100vw - 80px); }
      .lb-btn { padding: 12px 8px; }
      #lb-prev { left: 0; }
      #lb-next { right: 0; }
    }
    @media (max-width: 480px) {
      nav a:not(.active) { display: none; }
    }
  </style>
</head>

// ─── URL helpers ───────────────────────────────────────────────────────────────
// photo.regular — Unsplash "regular" (~1080px), used for gallery thumbnails.
// Unsplash URLs accept a &w= param; we replace it with a DPR-aware display width
// so mobile devices never download more pixels than they can show.
function thumbUrl(photo, displayWidth) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w   = Math.min(Math.round(displayWidth * dpr), 1080);
  return photo.regular.replace(/&w=\d+/, `&w=${w}`);
}
// photo.full — full original resolution, used for the lightbox viewer.
function fullUrl(photo) {
  return photo.full;
}

// ─── Justified (row-organic) layout ────────────────────────────────────────────
// Fills each row to the exact container width, varying row height per row —
// the same algorithm used by Google Photos, Flickr, and Chris Burkard's gallery.
const GAP = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 12;

function buildRows(items, containerWidth, targetRowHeight) {
  const rows = [];
  let row = [];
  let rowAR = 0; // sum of aspect ratios in current row

  items.forEach((photo, i) => {
    const ar = photo.w / photo.h;
    row.push({ ...photo, ar, index: i });
    rowAR += ar;

    const gapTotal  = (row.length - 1) * GAP;
    const rowHeight = (containerWidth - gapTotal) / rowAR;

    const isLast = i === items.length - 1;
    if (rowHeight <= targetRowHeight || isLast) {
      // For the last (possibly incomplete) row, cap height to targetRowHeight
      // so it doesn't stretch awkwardly.
      const finalHeight = isLast && rowHeight > targetRowHeight
        ? targetRowHeight
        : Math.round(rowHeight);
      rows.push({ items: [...row], height: finalHeight });
      row = [];
      rowAR = 0;
    }
  });

  return rows;
}

function renderGallery() {
  const gallery       = document.getElementById('gallery');
  const containerW    = gallery.clientWidth - GAP * 2;
  const targetH       = window.innerWidth < 600 ? 160 : 300;

  gallery.innerHTML   = '';
  const rows          = buildRows(photos, containerW, targetH);

  rows.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className    = 'gallery-row';
    rowEl.style.height = row.height + 'px';

    row.items.forEach(photo => {
      const itemW = Math.round(photo.ar * row.height);

      const item       = document.createElement('div');
      item.className   = 'gallery-item';
      item.style.width  = itemW + 'px';
      item.style.height = row.height + 'px';

      const img        = document.createElement('img');
      img.src          = thumbUrl(photo, itemW, row.height);
      img.alt          = photo.title;
      img.loading      = 'lazy';
      img.addEventListener('load', () => img.classList.add('loaded'));

      const overlay    = document.createElement('div');
      overlay.className = 'gallery-item-overlay';

      const caption    = document.createElement('div');
      caption.className = 'gallery-item-caption';
      caption.innerHTML = `<p>${photo.title}</p>`;

      item.appendChild(img);
      item.appendChild(overlay);
      item.appendChild(caption);
      item.addEventListener('click', () => openLightbox(photo.index));
      rowEl.appendChild(item);
    });

    gallery.appendChild(rowEl);
  });
}

// ─── Lightbox ──────────────────────────────────────────────────────────────────
const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lb-img');
const lbTitle   = document.getElementById('lb-title');
const lbCounter = document.getElementById('lb-counter');
let   currentIdx = 0;

function openLightbox(index) {
  currentIdx = index;
  updateLightbox(false);
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightbox(fade = true) {
  const photo = photos[currentIdx];
  if (fade) {
    lbImg.classList.add('fading');
    setTimeout(() => {
      lbImg.onload = () => {
        lbImg.classList.remove('fading');
        lbImg.onload = null;
      };
      lbImg.src = fullUrl(photo);
      lbImg.alt = photo.title;
    }, 180);
  } else {
    lbImg.src = fullUrl(photo);
    lbImg.alt = photo.title;
  }
  lbTitle.textContent   = photo.title;
  lbCounter.textContent = `${currentIdx + 1} / ${photos.length}`;
}

function prevPhoto() {
  currentIdx = (currentIdx - 1 + photos.length) % photos.length;
  updateLightbox();
}
function nextPhoto() {
  currentIdx = (currentIdx + 1) % photos.length;
  updateLightbox();
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', prevPhoto);
document.getElementById('lb-next').addEventListener('click', nextPhoto);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  prevPhoto();
  if (e.key === 'ArrowRight') nextPhoto();
  if (e.key === 'Escape')     closeLightbox();
});

// Touch swipe support for lightbox
let touchStartX = 0;
lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
lightbox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? nextPhoto() : prevPhoto();
}, { passive: true });

// ─── Sticky header ─────────────────────────────────────────────────────────────
const header = document.getElementById('header');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

// ─── Init & responsive re-render ───────────────────────────────────────────────
renderGallery();
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderGallery, 150);
}, { passive: true });
</script>

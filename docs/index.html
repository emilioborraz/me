<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure — Photography</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #1a1a1a;
      --text: #050505;
      --text-muted: #888;
      --gap: 12px;
      --header-h: 60px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 100;
      transition: background 0.4s ease, backdrop-filter 0.4s ease;
    }
    header.scrolled {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .site-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    nav {
      display: flex;
      gap: 36px;
      align-items: center;
    }
    nav a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    nav a:hover, nav a.active { color: var(--text); }

    /* ── Page Title ───────────────────────────────────────── */
    .page-title {
      padding: calc(var(--header-h) + 48px) 40px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .page-title h1 {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }
    .page-title span {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Gallery ──────────────────────────────────────────── */
    #gallery {
      padding: 0 var(--gap) var(--gap);
    }
    .gallery-row {
      display: flex;
      gap: var(--gap);
      margin-bottom: var(--gap);
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      flex-shrink: 0;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .gallery-item img.loaded { opacity: 1; }
    .gallery-item:hover img { transform: scale(1.04); }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.65) 0%,
        rgba(0, 0, 0, 0.08) 45%,
        transparent 65%
      );
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }

    .gallery-item-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 14px 16px;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    .gallery-item:hover .gallery-item-caption {
      opacity: 1;
      transform: translateY(0);
    }
    .gallery-item-caption p {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.88);
    }

    /* ── Lightbox ─────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lb-img {
      max-width: calc(100vw - 140px);
      max-height: calc(100vh - 100px);
      object-fit: contain;
      display: block;
      transition: opacity 0.18s ease;
    }
    #lb-img.fading { opacity: 0; }

    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      padding: 20px 16px;
      transition: color 0.2s ease;
      line-height: 0;
    }
    .lb-btn:hover { color: rgba(255, 255, 255, 0.9); }
    #lb-prev { left: 8px; }
    #lb-next { right: 8px; }
    .lb-btn svg { width: 30px; height: 30px; display: block; }

    #lb-close {
      position: fixed;
      top: 18px;
      right: 22px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      padding: 8px;
      transition: color 0.2s ease;
      line-height: 0;
    }
    #lb-close:hover { color: rgba(255, 255, 255, 0.9); }
    #lb-close svg { width: 20px; height: 20px; display: block; }

    .lb-meta {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    #lb-title {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 5px;
    }
    #lb-counter {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.28);
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      padding: 52px 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p, footer a {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
    }
    footer a:hover { color: var(--text); transition: color 0.2s; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --gap: 6px; }
      header { padding: 0 20px; }
      nav { gap: 24px; }
      .page-title { padding-left: 20px; padding-right: 20px; }
      footer { padding: 40px 20px; flex-direction: column; gap: 12px; }
      #lb-img { max-width: calc(100vw - 80px); }
      .lb-btn { padding: 12px 8px; }
      #lb-prev { left: 0; }
      #lb-next { right: 0; }
    }
    @media (max-width: 480px) {
      nav a:not(.active) { display: none; }
    }
  </style>
</head>
<body>

<header id="header">
  <a class="site-name" href="#">Borraz Photography</a>
  <nav>
    <a href="#" class="active">Adventure</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="page-title">
  <h1>Adventure</h1>
  <span>36 photographs</span>
</div>

<div id="gallery"></div>

<footer>
  <p>&copy; 2026 Emilio Borraz Ortega</p>
  <a target="blank" href="https://www.instagram.com/emilio.lens/">Instagram</a>
</footer>

<!-- Lightbox -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button id="lb-close" aria-label="Close lightbox">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M18 6 6 18M6 6l12 12"/>
    </svg>
  </button>
  <button class="lb-btn" id="lb-prev" aria-label="Previous photo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>
  <img id="lb-img" src="" alt="">
  <button class="lb-btn" id="lb-next" aria-label="Next photo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </button>
  <div class="lb-meta">
    <div id="lb-title"></div>
    <div id="lb-counter"></div>
  </div>
</div>

<script>
// ─── Photo data ────────────────────────────────────────────────────────────────
// w/h define the aspect ratio used for layout calculation.
// Replace the picsum src in buildThumbnailUrl() with your Unsplash URLs in stage 2.
const photos = [
  { title: "into the wild",       w: 1600, h: 1067, seed: 1001 },
  { title: "first light",         w:  800, h: 1200, seed: 1002 },
  { title: "northern passage",    w: 1200, h:  800, seed: 1003 },
  { title: "above the clouds",    w: 1400, h:  933, seed: 1004 },
  { title: "frozen tundra",       w:  800, h: 1067, seed: 1005 },
  { title: "the long road",       w: 2000, h:  800, seed: 1006 },
  { title: "last light",          w: 1200, h:  800, seed: 1007 },
  { title: "sea of clouds",       w:  900, h:  900, seed: 1008 },
  { title: "high alpine",         w: 1600, h: 1067, seed: 1009 },
  { title: "salt flats",          w:  800, h: 1200, seed: 1010 },
  { title: "before the storm",    w: 1400, h:  934, seed: 1011 },
  { title: "ridge line",          w: 1200, h:  800, seed: 1012 },
  { title: "nordic shore",        w: 1800, h:  900, seed: 1013 },
  { title: "winter solitude",     w:  800, h: 1200, seed: 1014 },
  { title: "lava fields",         w: 1600, h: 1067, seed: 1015 },
  { title: "open ocean",          w: 1200, h:  800, seed: 1016 },
  { title: "still waters",        w:  900, h:  900, seed: 1017 },
  { title: "golden hour",         w: 1400, h:  933, seed: 1018 },
  { title: "dusk coast",          w:  800, h: 1200, seed: 1019 },
  { title: "forest floor",        w: 2000, h:  900, seed: 1020 },
  { title: "high desert",         w: 1200, h:  800, seed: 1021 },
  { title: "river delta",         w: 1600, h: 1067, seed: 1022 },
  { title: "midnight sun",        w:  800, h: 1067, seed: 1023 },
  { title: "basalt columns",      w: 1400, h:  934, seed: 1024 },
  { title: "fog bank",            w: 1200, h:  800, seed: 1025 },
  { title: "summit push",         w:  800, h: 1200, seed: 1026 },
  { title: "tide pools",          w: 1600, h: 1067, seed: 1027 },
  { title: "snowfield",           w:  900, h:  900, seed: 1028 },
  { title: "red rock canyon",     w: 1800, h:  800, seed: 1029 },
  { title: "deep fjord",          w:  800, h: 1200, seed: 1030 },
  { title: "ascent",              w: 1200, h:  800, seed: 1031 },
  { title: "dawn patrol",         w: 1400, h:  933, seed: 1032 },
  { title: "canyon walls",        w:  800, h: 1067, seed: 1033 },
  { title: "homeward bound",      w: 1600, h: 1067, seed: 1034 },
  { title: "salt and ice",        w: 2000, h:  800, seed: 1035 },
  { title: "open horizon",        w: 1200, h:  800, seed: 1036 },
];

// ─── URL helpers ───────────────────────────────────────────────────────────────
// Swap these out for your Unsplash URLs in stage 2.
function thumbUrl(photo, displayWidth, displayHeight) {
  const dpr  = Math.min(window.devicePixelRatio || 1, 2);
  const pw   = Math.min(Math.round(displayWidth * dpr), 1600);
  const ph   = Math.round(pw / (photo.w / photo.h));
  return `https://picsum.photos/seed/${photo.seed}/${pw}/${ph}`;
}
function fullUrl(photo) {
  return `https://picsum.photos/seed/${photo.seed}/${photo.w}/${photo.h}`;
}

// ─── Justified (row-organic) layout ────────────────────────────────────────────
// Fills each row to the exact container width, varying row height per row —
// the same algorithm used by Google Photos, Flickr, and Chris Burkard's gallery.
const GAP = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 12;

function buildRows(items, containerWidth, targetRowHeight) {
  const rows = [];
  let row = [];
  let rowAR = 0; // sum of aspect ratios in current row

  items.forEach((photo, i) => {
    const ar = photo.w / photo.h;
    row.push({ ...photo, ar, index: i });
    rowAR += ar;

    const gapTotal  = (row.length - 1) * GAP;
    const rowHeight = (containerWidth - gapTotal) / rowAR;

    const isLast = i === items.length - 1;
    if (rowHeight <= targetRowHeight || isLast) {
      // For the last (possibly incomplete) row, cap height to targetRowHeight
      // so it doesn't stretch awkwardly.
      const finalHeight = isLast && rowHeight > targetRowHeight
        ? targetRowHeight
        : Math.round(rowHeight);
      rows.push({ items: [...row], height: finalHeight });
      row = [];
      rowAR = 0;
    }
  });

  return rows;
}

function renderGallery() {
  const gallery       = document.getElementById('gallery');
  const containerW    = gallery.clientWidth - GAP * 2;
  const targetH       = window.innerWidth < 600 ? 160 : 300;

  gallery.innerHTML   = '';
  const rows          = buildRows(photos, containerW, targetH);

  rows.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className    = 'gallery-row';
    rowEl.style.height = row.height + 'px';

    row.items.forEach(photo => {
      const itemW = Math.round(photo.ar * row.height);

      const item       = document.createElement('div');
      item.className   = 'gallery-item';
      item.style.width  = itemW + 'px';
      item.style.height = row.height + 'px';

      const img        = document.createElement('img');
      img.src          = thumbUrl(photo, itemW, row.height);
      img.alt          = photo.title;
      img.loading      = 'lazy';
      img.addEventListener('load', () => img.classList.add('loaded'));

      const overlay    = document.createElement('div');
      overlay.className = 'gallery-item-overlay';

      const caption    = document.createElement('div');
      caption.className = 'gallery-item-caption';
      caption.innerHTML = `<p>${photo.title}</p>`;

      item.appendChild(img);
      item.appendChild(overlay);
      item.appendChild(caption);
      item.addEventListener('click', () => openLightbox(photo.index));
      rowEl.appendChild(item);
    });

    gallery.appendChild(rowEl);
  });
}

// ─── Lightbox ──────────────────────────────────────────────────────────────────
const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lb-img');
const lbTitle   = document.getElementById('lb-title');
const lbCounter = document.getElementById('lb-counter');
let   currentIdx = 0;

function openLightbox(index) {
  currentIdx = index;
  updateLightbox(false);
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightbox(fade = true) {
  const photo = photos[currentIdx];
  if (fade) {
    lbImg.classList.add('fading');
    setTimeout(() => {
      lbImg.src = fullUrl(photo);
      lbImg.alt = photo.title;
      lbImg.classList.remove('fading');
    }, 180);
  } else {
    lbImg.src = fullUrl(photo);
    lbImg.alt = photo.title;
  }
  lbTitle.textContent   = photo.title;
  lbCounter.textContent = `${currentIdx + 1} / ${photos.length}`;
}

function prevPhoto() {
  currentIdx = (currentIdx - 1 + photos.length) % photos.length;
  updateLightbox();
}
function nextPhoto() {
  currentIdx = (currentIdx + 1) % photos.length;
  updateLightbox();
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', prevPhoto);
document.getElementById('lb-next').addEventListener('click', nextPhoto);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  prevPhoto();
  if (e.key === 'ArrowRight') nextPhoto();
  if (e.key === 'Escape')     closeLightbox();
});

// Touch swipe support for lightbox
let touchStartX = 0;
lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
lightbox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? nextPhoto() : prevPhoto();
}, { passive: true });

// ─── Sticky header ─────────────────────────────────────────────────────────────
const header = document.getElementById('header');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

// ─── Init & responsive re-render ───────────────────────────────────────────────
renderGallery();
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderGallery, 150);
}, { passive: true });
</script>

</body>
</html>
